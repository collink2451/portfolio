<section id="projects" class="py-9 px-6 max-w-7xl mx-auto">
  <h2 class="text-4xl font-bold text-center mb-4">
    <span
      class="bg-gradient-to-br from-base-content to-base-content/70 bg-clip-text text-transparent"
    >
      Projects
    </span>
  </h2>
  <p class="text-base-content/60 text-center mb-16">A few things I've built</p>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (project of projects; track project.name) {
      <div class="card bg-base-200 shadow-xl hover:scale-105 transition-transform duration-300">
        <figure>
          <img
            [src]="project.image"
            [alt]="project.name"
            class="w-full h-48 object-cover"
            (error)="onImageError($event)"
          />
        </figure>

        <div class="card-body">
          <h3 class="card-title">{{ project.name }}</h3>
          <p class="text-base-content/70 text-sm">{{ project.description }}</p>

          <div class="flex flex-wrap gap-2 mt-2">
            @for (tag of project.tags; track tag) {
              <span class="badge badge-primary badge-outline text-xs">{{ tag }}</span>
            }
          </div>

          <div class="card-actions justify-end mt-4">
            <a [href]="project.liveUrl" target="_blank" class="btn btn-primary btn-sm rounded-full">
              Live
            </a>
            <a
              [href]="project.githubUrl"
              target="_blank"
              class="btn btn-outline btn-sm rounded-full"
            >
              GitHub
            </a>
          </div>
        </div>
      </div>
    }
  </div>
</section>
